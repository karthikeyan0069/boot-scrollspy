<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Scrollspy Project</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <style>
    body {
      position: relative;
    }
    section {
      padding: 100px 20px;
      height: 100vh;
    }
  </style>
</head>

<body data-spy="scroll" data-target="#myNavbar" data-offset="50">

<!-- 🔝 Navbar -->
<nav id="myNavbar" class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
  <ul class="navbar-nav">
    <li class="nav-item">
      <a class="nav-link" href="#section1">Home</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#section2">About</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#section3">Services</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#section4">Contact</a>
    </li>
  </ul>
</nav>

<div class="container-fluid" style="margin-top:50px;">
  <div class="row">

    <!-- 📌 Vertical Scrollspy Menu -->
    <nav class="col-sm-3 col-4" id="myScrollspy">
      <ul class="nav nav-pills flex-column">
        <li class="nav-item">
          <a class="nav-link active" href="#section1">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#section2">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#section3">Services</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#section4">Contact</a>
        </li>
      </ul>
    </nav>

    <!-- 📄 Content Sections -->
    <div class="col-sm-9 col-8">

      <section id="section1" class="bg-primary text-white">
        <h1>Home</h1>
        <p>Scroll down to see Scrollspy in action.</p>
      </section>

      <section id="section2" class="bg-light">
        <h1>About</h1>
        <p>This section explains about the project.</p>
      </section>

      <section id="section3" class="bg-warning">
        <h1>Services</h1>
        <p>Details about services offered.</p>
      </section>

      <section id="section4" class="bg-info text-white">
        <h1>Contact</h1>
        <p>Contact information here.</p>
      </section>

    </div>

  </div>
</div>

</body>
</html>
